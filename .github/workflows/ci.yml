name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: echo "No linter for static HTML (skip or add HTMLHint if needed)"

  build:
    runs-on: ubuntu-latest
    needs: linter
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/matvei56/website:latest .

      - name: Push Docker image
        run:docker push ghcr.io/matvei56/website:latest